<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — AdaptLearn</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="signup">

  <div class="page-center">
    <div class="card card-sm">

      <!-- Brand -->
      <div class="auth-brand">
        <a href="index.html" style="text-decoration:none; display:contents">
          <div class="auth-brand-icon">📘</div>
        </a>
        <h2>Create Account</h2>
        <p class="text-muted">Join AdaptLearn and start your journey.</p>
      </div>

      <!-- Alert area -->
      <div id="alertBox"></div>

      <!-- Form -->
      <form id="signupForm" novalidate>

        <div class="form-group">
          <label for="name">Full name</label>
          <input
            type="text"
            id="name"
            class="form-control"
            placeholder="Jane Doe"
            autocomplete="name"
            required>
        </div>

        <div class="form-group">
          <label for="email">Email address</label>
          <input
            type="email"
            id="email"
            class="form-control"
            placeholder="you@example.com"
            autocomplete="email"
            required>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            class="form-control"
            placeholder="At least 8 characters"
            autocomplete="new-password"
            minlength="8"
            required>
        </div>

        <button type="submit" id="submitBtn" class="btn btn-primary btn-block mt-2">
          Create Account
        </button>

      </form>

      <hr class="divider">

      <p class="text-center text-muted">
        Already have an account? <a href="login.html">Sign in</a>
      </p>

    </div>
  </div>

  <script src="script.js"></script>
  <script src="motions.js"></script>
</body>
</html>
